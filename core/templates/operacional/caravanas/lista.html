{% extends 'base.html' %}
{% load static %}
{% load core_tags %}

{% block title %}Caravanas - Operacional{% endblock %}

{% block content %}
<div class="w-full">
    <!-- Breadcrumb e Título -->
    {% include 'includes/breadcrumbs.html' with current_page="Caravanas" %}
    
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <!-- Heroicon: truck -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 mr-2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
            </svg>
            Caravanas
        </h2>
    </div>

    <!-- Card de Filtros -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-6">
        <div class="p-6">
            <form method="get" 
                  hx-get="{% url 'operacional:caravanas_lista' %}"
                  hx-target="#lista-container"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  hx-trigger="submit">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-4">
                        <input type="text" 
                               name="search" 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                               placeholder="Buscar por nome, promotor, líder ou empresa..."
                               value="{{ search }}">
                    </div>
                    <div class="md:col-span-2">
                        <select name="status" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Todos os Status</option>
                            <option value="ativo" {% if status_filter == 'ativo' %}selected{% endif %}>Ativas</option>
                            <option value="inativo" {% if status_filter == 'inativo' %}selected{% endif %}>Inativas</option>
                        </select>
                    </div>
                    <div class="md:col-span-3">
                        <select name="tipo" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Todos os Tipos</option>
                            {% for value, label in tipos_caravana %}
                                <option value="{{ value }}" {% if tipo_filter == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="md:col-span-3">
                        <button type="submit" class="w-full bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-md transition-colors flex items-center justify-center">
                            <!-- Heroicon: magnifying-glass -->
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                            </svg>
                            Filtrar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Container da Lista -->
    <div id="lista-container">
        {% include 'operacional/caravanas/partial_lista.html' %}
    </div>
</div>

<!-- Floating Action Button -->
<button type="button" 
        class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-xl transition-all duration-200 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        hx-get="{% url 'operacional:caravana_criar' %}"
        hx-target="#caravanaModalContainer"
        hx-swap="innerHTML"
        title="Nova Caravana">
    <!-- Heroicon: plus -->
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
</button>

<!-- Container para Modais -->
<div id="caravanaModalContainer"></div>
{% endblock %}
