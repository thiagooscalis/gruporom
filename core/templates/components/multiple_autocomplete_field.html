<!-- Campo de autocomplete múltiplo reutilizável com Alpine.js e Tailwind -->
<div x-data="multipleAutocompleteField({
    fieldId: '{{ field_id }}',
    searchUrl: '{{ search_url }}',
    fieldName: '{{ field_name }}',
    initialValues: {% if initial_values %}[{% for value in initial_values %}{id: '{{ value.id }}', nome: '{{ value.nome|default:value|escapejs }}', doc: '{{ value.numero_doc|default:value.doc|default:""|escapejs }}'}{% if not forloop.last %},{% endif %}{% endfor %}]{% else %}[]{% endif %}
})" class="relative">
    
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">{{ label|default:"Selecionar itens" }}</label>
        
        <!-- Campo de busca -->
        <div class="relative">
            <input type="text" 
                   x-model="searchQuery"
                   @input="onSearchInput()"
                   @focus="onFocus()"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm pl-10"
                   placeholder="{{ placeholder|default:"Digite pelo menos 2 caracteres para buscar..." }}"
                   autocomplete="off">
            
            <!-- Heroicon: magnifying-glass -->
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
            </div>
        </div>
        
        {% if help_text %}
            <p class="mt-2 text-sm text-gray-500">{{ help_text }}</p>
        {% endif %}
    </div>
    
    <!-- Container para resultados do autocomplete -->
    <div x-show="showResults && (results.length > 0 || loading)" 
         x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="absolute z-10 mt-1 w-full bg-white shadow-lg max-h-60 rounded-md py-1 text-base ring-1 ring-black ring-opacity-5 overflow-auto focus:outline-none sm:text-sm"
         @click.outside="showResults = false">
        
        <!-- Resultados -->
        <template x-for="(result, index) in results" :key="index">
            <div class="cursor-pointer select-none relative py-2 pl-3 pr-9 transition-colors"
                 :class="isSelected(result.id) ? 'bg-blue-50 text-blue-900' : 'hover:bg-gray-100'"
                 @click="selectResult(result)">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <span class="font-normal block truncate" x-text="result.nome"></span>
                        <span class="text-gray-500 ml-2 text-sm" x-text="result.doc"></span>
                    </div>
                    <div x-show="isSelected(result.id)" class="text-blue-600">
                        <!-- Heroicon: check -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                        </svg>
                    </div>
                </div>
            </div>
        </template>
        
        <!-- Loading state -->
        <div x-show="loading" class="py-2 pl-3 pr-9 text-gray-500">
            <div class="flex items-center">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Buscando...
            </div>
        </div>
        
        <!-- No results -->
        <div x-show="!loading && showResults && results.length === 0 && searchQuery.length >= 2" 
             class="py-2 pl-3 pr-9 text-gray-500">
            Nenhum resultado encontrado
        </div>
    </div>
    
    <!-- Container para itens selecionados -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">{{ selected_label|default:"Itens selecionados" }}</label>
        <div class="min-h-[60px] p-3 border border-gray-300 rounded-md bg-gray-50">
            <template x-if="selectedItems.length === 0">
                <div class="flex items-center text-gray-500">
                    <!-- Heroicon: information-circle -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
                    </svg>
                    <span>{{ empty_message|default:"Nenhum item selecionado" }}</span>
                </div>
            </template>
            
            <template x-if="selectedItems.length > 0">
                <div class="flex flex-wrap gap-2">
                    <template x-for="item in selectedItems" :key="item.id">
                        <div class="inline-flex items-center bg-blue-100 text-blue-800 text-sm font-medium px-2.5 py-0.5 rounded-full">
                            <span x-text="item.nome" class="mr-1"></span>
                            <button type="button" 
                                    @click="removeItem(item.id)"
                                    class="ml-1 text-blue-600 hover:text-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-full p-0.5">
                                <!-- Heroicon: x-mark -->
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
    
    <!-- Inputs hidden para envio do formulário -->
    <template x-for="item in selectedItems" :key="item.id">
        <input type="hidden" :name="fieldName" :value="item.id">
    </template>
</div>

<script>
// Alpine.js component para autocomplete múltiplo
function multipleAutocompleteField(config) {
    return {
        searchQuery: '',
        results: [],
        showResults: false,
        loading: false,
        selectedItems: [],
        fieldName: config.fieldName,
        debounceTimer: null,
        
        init() {
            // Configurar valores iniciais se fornecidos
            if (config.initialValues && config.initialValues.length > 0) {
                this.selectedItems = [...config.initialValues];
            }
        },
        
        onSearchInput() {
            clearTimeout(this.debounceTimer);
            
            if (this.searchQuery.length < 2) {
                this.showResults = false;
                this.results = [];
                return;
            }
            
            this.debounceTimer = setTimeout(() => {
                this.fetchResults();
            }, 300);
        },
        
        onFocus() {
            if (this.searchQuery.length >= 2 && this.results.length > 0) {
                this.showResults = true;
            }
        },
        
        async fetchResults() {
            this.loading = true;
            this.showResults = true;
            
            try {
                const url = new URL(config.searchUrl, window.location.origin);
                url.searchParams.set('q', this.searchQuery);
                url.searchParams.set('format', 'json');
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Erro na busca');
                
                const data = await response.json();
                this.results = data.results || [];
            } catch (error) {
                console.error('Erro no autocomplete múltiplo:', error);
                this.results = [];
            } finally {
                this.loading = false;
            }
        },
        
        selectResult(result) {
            // Não adiciona se já estiver selecionado
            if (!this.isSelected(result.id)) {
                this.selectedItems.push({
                    id: result.id,
                    nome: result.nome,
                    doc: result.doc || ''
                });
            }
            
            // Limpar o campo de busca e fechar resultados
            this.searchQuery = '';
            this.showResults = false;
            this.results = [];
        },
        
        removeItem(id) {
            this.selectedItems = this.selectedItems.filter(item => item.id != id);
        },
        
        isSelected(id) {
            return this.selectedItems.some(item => item.id == id);
        }
    }
}

// Função global para compatibilidade com templates antigos
window.selectMultipleItem = function(fieldId, id, nome, doc = '') {
    const element = document.querySelector(`[x-data*="multipleAutocompleteField"][x-data*="'${fieldId}'"]`);
    if (element && element._x_dataStack && element._x_dataStack[0]) {
        const component = element._x_dataStack[0];
        if (!component.isSelected(id)) {
            component.selectedItems.push({ id, nome, doc });
        }
        component.searchQuery = '';
        component.showResults = false;
        component.results = [];
    }
}
</script>
