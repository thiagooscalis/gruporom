<!-- Simple Delete Modal Component -->
<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50" 
     x-data="{ 
         show: false,
         init() {
             this.$nextTick(() => {
                 this.show = true;
             });
         },
         close() {
             this.show = false;
             setTimeout(() => {
                 $el.remove();
             }, 300);
         }
     }" 
     x-init="init()"
     x-show="show" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     @keydown.escape="close()"
     @click.self="close()">
    
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4" 
         @click.stop
         x-show="show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform scale-95"
         x-transition:enter-end="opacity-100 transform scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 transform scale-100"
         x-transition:leave-end="opacity-0 transform scale-95">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 bg-danger-600 text-white rounded-t-lg">
            <h3 class="text-lg font-semibold flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 mr-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                </svg>
                Confirmar Exclusão
            </h3>
            <button type="button" @click="close()" class="text-white hover:text-danger-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <!-- Body -->
        <div class="p-6">
            <div class="text-center mb-6">
                <div class="mx-auto flex items-center justify-center w-16 h-16 bg-danger-100 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-danger-600">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                    </svg>
                </div>
                <h4 class="text-lg font-medium text-slate-900 mb-2">
                    {% block confirmation_question %}Tem certeza que deseja excluir este item?{% endblock %}
                </h4>
            </div>
            
            {% block item_details %}
            <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-4">
                <p class="text-sm text-slate-600">Detalhes do item</p>
            </div>
            {% endblock %}
            
            {% block warning_messages %}
            <div class="bg-warning-50 border border-warning-200 rounded-md p-4">
                <div class="flex">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-warning-500 mr-3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                    </svg>
                    <div>
                        <h3 class="text-sm font-medium text-warning-800">Atenção:</h3>
                        <p class="mt-1 text-sm text-warning-700">Esta ação não pode ser desfeita.</p>
                    </div>
                </div>
            </div>
            {% endblock %}
        </div>
        
        <!-- Footer -->
        <div class="flex items-center justify-end px-6 py-4 border-t border-slate-200 space-x-3">
            <button type="button" 
                    class="px-4 py-2 text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 transition-colors"
                    @click="close()">
                Cancelar
            </button>
            {% block delete_button %}
            <button type="button" class="px-4 py-2 bg-danger-600 hover:bg-danger-700 text-white rounded-md transition-colors">
                Excluir
            </button>
            {% endblock %}
        </div>
    </div>
</div>
