{% load static %}
{% load core_tags %}
<aside id="aside" class="hidden lg:block fixed left-0 top-0 w-64 h-full bg-gray-900 shadow-lg overflow-y-auto">
    <!-- Logo -->
    <div class="flex justify-center p-4">
        <img src="{% static 'logo_gruporom.svg' %}" alt="logo" class="w-36">
    </div>
    
    <!-- Informações do usuário -->
    <div class="px-4 pb-3 mb-3 border-b border-gray-700">
        <div class="flex items-center">
            <div class="flex-shrink-0">
                <div class="bg-primary/20 p-2 rounded-full">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
            </div>
            <div class="flex-grow ml-3">
                <div class="font-semibold text-sm text-white">{{ user.pessoa.nome|default:user.username }}</div>
            </div>
        </div>
    </div>
    
    <!-- Câmbio do dia -->
    {% if cambio_hoje %}
    <div class="px-4 pb-3 mb-3 border-b border-gray-700">
        <div class="flex items-center">
            <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <div>
                <div class="font-bold text-green-500">R$ {{ dolar_hoje|floatformat:4 }}</div>
                <span class="text-gray-400 text-xs">USD/BRL</span>
            </div>
        </div>
    </div>
    {% endif %}
    
    <!-- Menu -->
    <nav class="px-2">
        {% include 'menu/'|add:area|add:'.html' %}
        
        {% if user.groups.count > 1 %}
        <hr class="my-3 border-gray-700">
        <a href="#" class="flex items-center px-3 py-2 text-white hover:bg-gray-800 rounded-md transition-colors" 
           @click.prevent="$dispatch('open-areas-modal')">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
            </svg>
            Áreas de Acesso
        </a>
        {% endif %}
        
        <!-- Links universais para todos os usuários logados -->
        <hr class="my-3 border-gray-700">
        
        <a href="#" class="flex items-center px-3 py-2 text-white hover:bg-gray-800 rounded-md transition-colors mb-2"
           @click.prevent="$dispatch('open-password-modal')"
           hx-get="{% url 'alterar_senha_form' %}"
           hx-target="#modalAlterarSenhaBody"
           hx-swap="innerHTML">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 112 2m2 0a2 2 0 01-2 2m-2-2a2 2 0 00-2 2m-2-2a2 2 0 00-2-2m-2 0a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2m-6 4v6m0 0v2a2 2 0 002 2h6a2 2 0 002-2v-2m-6 0h6"></path>
            </svg>
            Alterar Senha
        </a>
        
        <a href="#" class="flex items-center px-3 py-2 text-white hover:bg-gray-800 rounded-md transition-colors"
           @click.prevent="$dispatch('open-logout-modal')">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            Sair
        </a>
    </nav>
</aside>
