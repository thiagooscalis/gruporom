{% if messages %}
<div class="w-full">
    {% for message in messages %}
        <div x-data="{ show: true }" 
             x-show="show"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 transform scale-95"
             x-transition:enter-end="opacity-100 transform scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 transform scale-100"
             x-transition:leave-end="opacity-0 transform scale-95"
             class="relative mb-3 rounded-lg p-4 border-l-4
                    {% if message.tags == 'success' %}bg-green-50 border-green-500 text-green-800{% endif %}
                    {% if message.tags == 'error' %}bg-red-50 border-red-500 text-red-800{% endif %}
                    {% if message.tags == 'warning' %}bg-yellow-50 border-yellow-500 text-yellow-800{% endif %}
                    {% if message.tags == 'info' %}bg-blue-50 border-blue-500 text-blue-800{% endif %}
                    {% if not message.tags %}bg-gray-50 border-gray-500 text-gray-800{% endif %}">
            {{ message }}
            <button @click="show = false" 
                    class="absolute top-2 right-2 text-gray-400 hover:text-gray-600 focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    {% endfor %}
</div>
{% endif %}
