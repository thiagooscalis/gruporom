{% load core_tags %}

<!-- Modal de Áreas de Acesso - Versão Componentizada -->
{% if user.groups.count > 1 %}

<div x-data="{ 
        isOpen: false,
        open() { this.isOpen = true; },
        close() { this.isOpen = false; }
     }" 
     x-on:open-areas-modal.window="open()"
     x-on:close-areas-modal.window="close()"
     x-on:keydown.escape.window="close()"
     x-cloak
     class="fixed inset-0 z-50 overflow-y-auto"
     :class="{ 'hidden': !isOpen }">
    
    <!-- Backdrop com blur (padrão do sistema) -->
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="close()"
         class="fixed inset-0 bg-black/50 backdrop-blur-sm"></div>
    
    <!-- Modal Container (padrão do sistema) -->
    <div class="flex min-h-screen items-center justify-center p-4">
        <div x-show="isOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 transform scale-95"
             x-transition:enter-end="opacity-100 transform scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 transform scale-100"
             x-transition:leave-end="opacity-0 transform scale-95"
             @click.stop
             class="relative w-full max-w-2xl transform overflow-hidden rounded-lg bg-white shadow-xl">
            
            <!-- Modal Header (cores da marca) -->
            <div class="bg-primary px-6 py-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-white flex items-center">
                        <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                        </svg>
                        Áreas de Acesso
                    </h3>
                    <button @click="close()"
                            class="rounded-lg p-1 text-white/70 hover:bg-white/10 hover:text-white focus:outline-none focus:ring-2 focus:ring-white/50">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Modal Body -->
            <div class="p-6">
                <div class="grid grid-cols-2 gap-4">
                    {% for group in user.groups.all %}
                    <a href="{% url group.name|area_url %}" class="group block">
                        <div class="relative rounded-lg border-2 p-6 text-center transition-all hover:shadow-lg
                                    {% if group.name|slugify in request.path %}
                                        border-primary bg-primary/5
                                    {% else %}
                                        border-gray-200 hover:border-primary/50 bg-white
                                    {% endif %}">
                            
                            <!-- Nome da área -->
                            <h6 class="text-sm font-semibold 
                                       {% if group.name|slugify in request.path %}text-primary{% else %}text-gray-900{% endif %}">
                                {{ group.name }}
                            </h6>
                            
                            <!-- Indicador de área atual -->
                            {% if group.name|slugify in request.path %}
                            <div class="mt-2 flex items-center justify-center text-xs text-primary">
                                <svg class="h-4 w-4 mr-1" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"></path>
                                </svg>
                                Área atual
                            </div>
                            {% endif %}
                        </div>
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

{% endif %}
